<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกงานรอ Sort - CWM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- เพิ่ม Flatpickr CSS สำหรับหน้าต่างเลือกเวลาแบบ 24 ชม. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sortable-header { cursor: pointer; user-select: none; }
        .sortable-header:hover { background-color: #e2e8f0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <span class="text-xl font-bold tracking-wider">CWM SORTING</span>
                    <span class="hidden md:inline-block bg-blue-700 text-xs px-2 py-1 rounded">ระบบจัดการงานรอ Sort</span>
                </div>
                <div class="flex items-center gap-4">
                    <div id="user-info" class="text-sm"></div>
                    <button onclick="window.location.href='index.html'" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded text-sm transition-colors">
                        กลับหน้าหลัก
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-6">
        
        <!-- Form Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 border-b pb-2 mb-4">📥 ลงบันทึกงานรอ Sort ใหม่</h2>
            <form id="sortForm" onsubmit="submitSortJob(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                <!-- 1. วันที่ -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">วันที่ (Date)</label>
                    <input type="date" id="sort-date" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- 2. เวลา (ปรับเป็น Text เพื่อใช้ Flatpickr บังคับ 24H) -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">เวลา (Time - 24H)</label>
                    <input type="text" id="sort-time" required placeholder="HH:MM" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                </div>

                <!-- 3. เครื่องจักร -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">จากเครื่อง (Machine)</label>
                    <select id="sort-machine" required onchange="onMachineChange()" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">-- กำลังโหลดข้อมูล... --</option>
                    </select>
                </div>

                <!-- 4. รุ่นสินค้า -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">รุ่นสินค้า (Model)</label>
                    <select id="sort-product" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">-- เลือกรุ่น --</option>
                        <option value="S1B29288-JR (10A)">S1B29288-JR (10A)</option>
                        <option value="S1B71819-JR (16A)">S1B71819-JR (16A)</option>
                        <option value="S1B29292-JR (20A)">S1B29292-JR (20A)</option>
                        <option value="51207080HC-JR (25/32A)">51207080HC-JR (25/32A)</option>
                    </select>
                </div>

                <!-- 5. อาการเสีย -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">อาการเสีย (NG Symptom)</label>
                    <select id="sort-symptom" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="">-- กำลังโหลดอาการ... --</option>
                    </select>
                </div>

                <!-- 6. จำนวนและหน่วย (kg/ชิ้น) -->
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">จำนวนที่รอ Sort</label>
                    <div class="flex gap-2">
                        <input type="number" id="sort-qty" required min="0.01" step="any" placeholder="ระบุจำนวน..." class="w-2/3 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        <select id="sort-unit" class="w-1/3 p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="kg" selected>kg</option>
                            <option value="ชิ้น">ชิ้น</option>
                        </select>
                    </div>
                </div>

                <!-- 7. หมายเหตุ -->
                <div class="lg:col-span-2">
                    <label class="block text-xs font-bold text-gray-600 mb-1">หมายเหตุ / จุดที่พบ</label>
                    <input type="text" id="sort-remark" placeholder="ใส่เฉพาะหมายเหตุ..." class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- ปุ่ม Submit -->
                <div class="md:col-span-2 lg:col-span-4 flex justify-end mt-2">
                    <button type="submit" id="btn-save-sort" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-sm">
                        + บันทึกเข้าระบบรอ Sort
                    </button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-3 mb-4 gap-3">
                <h2 class="text-lg font-bold text-gray-800">📋 รายการงานรอ Sort (Pending)</h2>
                
                <div class="flex w-full md:w-auto gap-2">
                    <!-- เพิ่มช่องค้นหาข้อมูลแบบ Fuzzy -->
                    <input type="text" id="searchInput" oninput="filterJobs()" placeholder="🔍 ค้นหา (ชื่อ, รุ่น, อาการ)..." class="w-full md:w-64 p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    
                    <button onclick="loadSortJobs()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg transition-colors whitespace-nowrap">
                        🔄 รีเฟรช
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm uppercase">
                            <th class="p-3 border-b">รหัสงาน</th>
                            <th class="p-3 border-b sortable-header transition-colors group" onclick="toggleSort('date')">
                                <div class="flex items-center justify-between">
                                    วันที่แจ้ง <span id="sort-icon-date" class="text-blue-500 ml-1">▼</span>
                                </div>
                            </th>
                            <th class="p-3 border-b">รุ่นสินค้า</th>
                            <th class="p-3 border-b">อาการ (Symptom)</th>
                            <th class="p-3 border-b text-right">จำนวน</th>
                            <th class="p-3 border-b">ผู้แจ้ง</th>
                            <th class="p-3 border-b text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="sort-table-body">
                        <tr><td colspan="7" class="text-center py-8 text-gray-500">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                    <tfoot id="sort-table-foot" class="bg-blue-50 hidden">
                        <!-- สรุปยอดรวมจะถูกสร้างด้วย JS -->
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal สำหรับปิดงาน Sort -->
    <div id="closeJobModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 mx-4">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-lg font-bold text-gray-800">✅ ยืนยันปิดงาน Sort</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl font-bold">✖</button>
            </div>
            
            <form id="closeJobForm" onsubmit="submitCloseJob(event)">
                <input type="hidden" id="modal-job-id">
                <input type="hidden" id="modal-product-str">
                
                <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <p class="text-sm text-gray-600">รหัสงาน: <span id="modal-job-id-text" class="font-bold text-blue-800"></span></p>
                    <p class="text-sm text-gray-600 mt-1">รุ่นสินค้า: <span id="modal-product-text" class="font-bold text-gray-800"></span></p>
                </div>

                <!-- ยอด FG -->
                <div class="mb-4 bg-green-50 p-4 rounded-lg border border-green-200">
                    <label class="block text-xs font-bold text-green-800 mb-2">ยอดงานดี (FG - Finished Goods)</label>
                    <div class="flex gap-2 mb-1">
                        <input type="number" id="modal-fg-qty" required min="0" step="any" placeholder="ระบุจำนวน" class="w-2/3 p-2 border border-green-300 rounded focus:ring-2 focus:ring-green-500" oninput="calculateModalQty('fg')">
                        <select id="modal-fg-unit" class="w-1/3 p-2 border border-green-300 rounded focus:ring-2 focus:ring-green-500 bg-white" onchange="calculateModalQty('fg')">
                            <option value="kg" selected>kg</option>
                            <option value="ชิ้น">ชิ้น</option>
                        </select>
                    </div>
                    <p id="modal-fg-convert" class="text-xs text-green-700 font-medium text-right h-4"></p>
                </div>

                <!-- ยอด NG -->
                <div class="mb-6 bg-red-50 p-4 rounded-lg border border-red-200">
                    <label class="block text-xs font-bold text-red-800 mb-2">ยอดงานเสีย (NG - Not Good)</label>
                    <div class="flex gap-2 mb-1">
                        <input type="number" id="modal-ng-qty" required min="0" step="any" placeholder="ระบุจำนวน" class="w-2/3 p-2 border border-red-300 rounded focus:ring-2 focus:ring-red-500" oninput="calculateModalQty('ng')">
                        <select id="modal-ng-unit" class="w-1/3 p-2 border border-red-300 rounded focus:ring-2 focus:ring-red-500 bg-white" onchange="calculateModalQty('ng')">
                            <option value="kg" selected>kg</option>
                            <option value="ชิ้น">ชิ้น</option>
                        </select>
                    </div>
                    <p id="modal-ng-convert" class="text-xs text-red-700 font-medium text-right h-4"></p>
                </div>

                <div class="flex justify-end gap-3 mt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition">ยกเลิก</button>
                    <button type="submit" id="btn-submit-close" class="px-5 py-2 bg-green-600 text-white font-bold rounded-lg hover:bg-green-700 transition shadow">✔ บันทึกปิดงาน</button>
                </div>
            </form>
        </div>
    </div>

    <!-- เพิ่ม Flatpickr JS สำหรับสร้าง Time Picker 24H -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt3Bf_2h21BBcCHQSjizowy_kD5vsoUqgaC_YmVjLuQybJO1BBRt3eaSM0PuKEFfvruw/exec";
        let currentUser = null;
        let globalMachineMapping = {}; 
        let allPendingJobs = []; 
        let currentSort = { field: 'date', order: 'desc' }; 
        let timePickerInstance = null; // ตัวแปรเก็บ Instance ของ Time Picker

        window.onload = () => {
            const savedUser = localStorage.getItem('CWM_AUTH_USER');
            if (!savedUser) {
                alert("กรุณาเข้าสู่ระบบผ่านหน้าหลักก่อนใช้งาน");
                window.location.href = 'index.html';
                return;
            }

            currentUser = JSON.parse(savedUser);
            const allowedRoles = ['Admin', 'Production', 'QC'];
            
            if (!allowedRoles.includes(currentUser.role)) {
                alert(`คุณ (${currentUser.role}) ไม่มีสิทธิ์เข้าถึงหน้านี้ อนุญาตเฉพาะ Admin, Production และ QC`);
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('user-info').innerHTML = `ผู้ใช้งาน: <span class="font-bold text-blue-200">${currentUser.name || currentUser.username}</span> (${currentUser.role})`;
            
            initTimePicker(); // เริ่มต้นการทำงานของ Flatpickr
            setDefaultDateTime();
            fetchOptions();
            loadSortJobs();
        };

        // ฟังก์ชันเริ่มต้น Time Picker บังคับ 24 ชั่วโมง และปิด UI บนมือถือ
        function initTimePicker() {
            timePickerInstance = flatpickr("#sort-time", {
                enableTime: true,
                noCalendar: true,
                dateFormat: "H:i",    // รูปแบบ 24 ชั่วโมง (เช่น 14:30)
                time_24hr: true,      // บังคับแสดงผลในหน้าต่างเป็น 24 ชั่วโมง
                disableMobile: true,  // บังคับปิด UI นาฬิกาของมือถือเพื่อแก้ปัญหา Error "ป้อนค่าที่ถูกต้อง"
                defaultDate: new Date() // ตั้งค่าเริ่มต้นเป็นเวลาปัจจุบัน
            });
        }

        // ฟังก์ชันตั้งค่าวันที่/เวลาเริ่มต้น
        function setDefaultDateTime() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('sort-date').value = `${yyyy}-${mm}-${dd}`;
            
            // รีเซ็ตเวลาใน Flatpickr ให้เป็นเวลาปัจจุบันล่าสุด
            if(timePickerInstance) {
                timePickerInstance.setDate(new Date());
            }
        }

        // ดึงข้อมูลตัวเลือกทั้งหมด (Machine และ อาการ NG จาก Cloud)
        async function fetchOptions() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=GET_OPTIONS");
                const data = await res.json();
                
                const selectSymptom = document.getElementById('sort-symptom');
                selectSymptom.innerHTML = '<option value="">-- เลือกอาการเสีย --</option>';
                
                // ดึงเฉพาะจาก Cloud เท่านั้น (ไม่มี fallback แบบ manual "อื่นๆ")
                if (data.ngTypes && data.ngTypes.length > 0) {
                    data.ngTypes.forEach(symptom => {
                        selectSymptom.innerHTML += `<option value="${symptom}">${symptom}</option>`;
                    });
                }

                const selectMachine = document.getElementById('sort-machine');
                selectMachine.innerHTML = '<option value="">-- เลือกเครื่องจักร --</option>';
                
                if (data.machineMapping) {
                    globalMachineMapping = data.machineMapping;
                    let machineList = Object.keys(data.machineMapping).sort();
                    
                    if (machineList.length === 0) {
                        machineList = Array.from({length: 16}, (_, i) => `CWM-${String(i+1).padStart(2,'0')}`);
                    }
                    
                    machineList.forEach(m => {
                        selectMachine.innerHTML += `<option value="${m}">${m}</option>`;
                    });
                }
            } catch (err) {
                console.error("Failed to load options", err);
                // หากดึงข้อมูลล้มเหลว จะไม่เปิดให้กรอกแบบ local ป้องกันข้อมูลทับซ้อน
                document.getElementById('sort-symptom').innerHTML = '<option value="">-- โหลดอาการเสียไม่สำเร็จ --</option>';
                document.getElementById('sort-machine').innerHTML = '<option value="">(ไม่สามารถโหลดข้อมูลเครื่องจักรได้)</option>';
            }
        }

        // ฟังก์ชันดึงรุ่นอัตโนมัติเมื่อเลือกเครื่อง
        window.onMachineChange = function() {
            const mac = document.getElementById('sort-machine').value;
            const modSelect = document.getElementById('sort-product');
            
            if (mac && globalMachineMapping[mac] && globalMachineMapping[mac] !== 'Unassigned') {
                modSelect.value = globalMachineMapping[mac]; 
            } else {
                modSelect.value = ""; 
            }
        };

        // บันทึกงานรอ Sort ใหม่
        async function submitSortJob(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save-sort');
            btn.disabled = true;
            btn.innerHTML = "⏳ กำลังบันทึก...";

            const dateVal = document.getElementById('sort-date').value;
            const timeVal = document.getElementById('sort-time').value; // จะได้ค่าเป็น HH:MM เสมอ
            const machineVal = document.getElementById('sort-machine').value;
            const productVal = document.getElementById('sort-product').value;
            const symptomVal = document.getElementById('sort-symptom').value;
            
            // เช็คว่าโหลดอาการเสียมาได้หรือไม่ ถ้าเป็นค่าว่างให้หยุดทำงานและแจ้งเตือน
            if (!symptomVal) {
                alert("กรุณาเลือกอาการเสียจากระบบ");
                btn.disabled = false;
                btn.innerHTML = "+ บันทึกเข้าระบบรอ Sort";
                return;
            }

            const qtyVal = document.getElementById('sort-qty').value;
            const unitVal = document.getElementById('sort-unit').value;
            const remarkVal = document.getElementById('sort-remark').value;

            // นำเวลามาต่อท้ายวันที่ หรือสามารถนำไปใส่ในส่วนหมายเหตุก็ได้
            const finalProduct = machineVal ? `${machineVal} : ${productVal}` : productVal;
            const finalQty = `${qtyVal} ${unitVal}`; 
            const finalRemark = remarkVal.trim(); 

            const payload = {
                action: 'SAVE_SORTING',
                data: {
                    date: `${dateVal} ${timeVal}`, // นำเวลาไปผูกกับวันที่เพื่อบันทึก
                    product: finalProduct,
                    symptom: symptomVal,
                    qty: finalQty,
                    remark: finalRemark,
                    recorder: currentUser.name || currentUser.username,
                    status: 'Pending'
                }
            };

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if (result.status === 'success') {
                    alert("✅ บันทึกงานรอ Sort สำเร็จ");
                    document.getElementById('sortForm').reset();
                    setDefaultDateTime(); 
                    document.getElementById('sort-unit').value = 'kg'; 
                    loadSortJobs(); 
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + result.message);
                }
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "+ บันทึกเข้าระบบรอ Sort";
            }
        }

        // โหลดรายการงานที่รอ Sort
        async function loadSortJobs() {
            const tbody = document.getElementById('sort-table-body');
            const tfoot = document.getElementById('sort-table-foot');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500"><div class="inline-block w-6 h-6 border-4 border-blue-500 border-solid rounded-full border-t-transparent animate-spin"></div><br>กำลังโหลดข้อมูล...</td></tr>';
            tfoot.classList.add('hidden');

            try {
                const res = await fetch(SCRIPT_URL + "?action=GET_SORTING");
                const result = await res.json();
                
                if (result.status === 'success') {
                    allPendingJobs = result.data;
                    renderTable();
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">❌ โหลดข้อมูลไม่สำเร็จ</td></tr>';
            }
        }

        function getWeightPerPc(productStr) {
            if (!productStr) return 0.003;
            if (productStr.includes("10A")) return 0.00228;
            if (productStr.includes("16A")) return 0.00279;
            if (productStr.includes("20A")) return 0.00357;
            if (productStr.includes("25/32A")) return 0.005335;
            return 0.003;
        }

        function parseQuantity(qtyStr, productStr) {
            const val = parseFloat(qtyStr);
            if (isNaN(val)) return { pcs: 0, kg: 0, display: qtyStr };
            
            const isKg = qtyStr.toLowerCase().includes('kg');
            const wpp = getWeightPerPc(productStr);
            let pcs = 0, kg = 0;
            
            if (isKg) {
                kg = val;
                pcs = Math.round(kg / wpp);
                return { 
                    pcs: pcs, kg: kg, 
                    display: `<span class="font-bold text-gray-800">${kg.toFixed(2)} kg</span><br><span class="text-xs text-gray-500 font-normal">(${pcs.toLocaleString()} ชิ้น)</span>` 
                };
            } else {
                pcs = val;
                kg = pcs * wpp;
                return { 
                    pcs: pcs, kg: kg, 
                    display: `<span class="font-bold text-gray-800">${pcs.toLocaleString()} ชิ้น</span><br><span class="text-xs text-gray-500 font-normal">(${kg.toFixed(2)} kg)</span>` 
                };
            }
        }

        window.toggleSort = function(field) {
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'desc';
            }
            
            document.getElementById('sort-icon-date').innerText = currentSort.order === 'asc' ? '▲' : '▼';
            renderTable();
        };

        // --- เพิ่มฟังก์ชันค้นหา (Fuzzy Search) ---
        window.filterJobs = function() {
            renderTable();
        };

        // อัลกอริทึม Fuzzy Match (เช็คว่าตัวอักษรค้นหามีอยู่ในข้อความตามลำดับหรือไม่ โดยไม่จำเป็นต้องติดกัน)
        function fuzzyMatch(pattern, str) {
            if (!pattern) return true;
            pattern = pattern.toLowerCase().replace(/\s/g, ''); // เอาช่องว่างออกตอนเช็คแพทเทิร์น
            str = str.toLowerCase();
            let patternIdx = 0;
            let strIdx = 0;
            
            while (patternIdx < pattern.length && strIdx < str.length) {
                if (pattern[patternIdx] === str[strIdx]) {
                    patternIdx++;
                }
                strIdx++;
            }
            return patternIdx === pattern.length;
        }

        function renderTable() {
            const tbody = document.getElementById('sort-table-body');
            const tfoot = document.getElementById('sort-table-foot');
            const searchInput = document.getElementById('searchInput') ? document.getElementById('searchInput').value : '';
            
            // กรองข้อมูลด้วย Fuzzy Search ก่อนนำไปแสดง
            let jobsToRender = allPendingJobs.filter(job => {
                // นำข้อความที่ต้องการให้ค้นหาได้มารวมเป็นก้อนเดียวกัน (รหัสงาน, วันที่, สินค้า, อาการ, หมายเหตุ, ผู้แจ้ง)
                const searchString = `${job.jobId} ${job.date} ${job.product} ${job.symptom} ${job.remark || ''} ${job.recorder}`;
                return fuzzyMatch(searchInput, searchString);
            });

            if (jobsToRender.length === 0) {
                if(searchInput !== '') {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-500 font-bold">❌ ไม่พบรายการที่ตรงกับคำค้นหา</td></tr>';
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-green-600 font-bold">🎉 ไม่มีงานค้าง Sort</td></tr>';
                }
                tfoot.classList.add('hidden');
                return;
            }

            // เรียงลำดับข้อมูลที่ถูกกรองมาแล้ว
            jobsToRender.sort((a, b) => {
                let valA = a[currentSort.field] || '';
                let valB = b[currentSort.field] || '';
                if (valA < valB) return currentSort.order === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.order === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = '';
            let totalPcs = 0;
            let totalKg = 0;

            jobsToRender.forEach(job => {
                const qtyInfo = parseQuantity(job.qty, job.product);
                totalPcs += qtyInfo.pcs;
                totalKg += qtyInfo.kg;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-3 text-xs font-mono text-gray-500">${job.jobId}</td>
                        <td class="p-3 text-sm font-medium text-gray-800">${job.date}</td>
                        <td class="p-3 text-sm font-bold text-blue-800">${job.product}</td>
                        <td class="p-3 text-sm text-red-600">${job.symptom} <br><span class="text-xs text-gray-400">${job.remark || '-'}</span></td>
                        <td class="p-3 text-sm text-right leading-tight">${qtyInfo.display}</td>
                        <td class="p-3 text-sm">${job.recorder}</td>
                        <td class="p-3 text-center">
                            <!-- เปลี่ยนจากการยืนยันแบบธรรมดา ไปเรียกใช้ฟังก์ชันเปิด Modal -->
                            <button onclick="openCloseModal('${job.jobId}', '${job.product}')" class="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded text-xs font-bold transition-colors border border-green-300 shadow-sm">
                                ✔ ปิดงาน (Done)
                            </button>
                        </td>
                    </tr>
                `;
            });

            tfoot.innerHTML = `
                <tr>
                    <td colspan="4" class="p-4 text-right font-bold text-blue-900 border-t-2 border-blue-200">
                        รวมงานรอ Sort ทั้งหมด:
                    </td>
                    <td class="p-4 text-right border-t-2 border-blue-200 leading-tight">
                        <span class="font-bold text-blue-900 text-base">${totalKg.toFixed(2)} kg</span><br>
                        <span class="text-sm text-blue-700 font-medium">(${totalPcs.toLocaleString()} ชิ้น)</span>
                    </td>
                    <td colspan="2" class="p-4 border-t-2 border-blue-200"></td>
                </tr>
            `;
            tfoot.classList.remove('hidden');
        }

        // --- ส่วนของการจัดการ Modal ปิดงาน ---

        // เปิด Modal และโหลดข้อมูลตั้งต้น
        window.openCloseModal = function(jobId, productStr) {
            document.getElementById('modal-job-id').value = jobId;
            document.getElementById('modal-product-str').value = productStr;
            
            document.getElementById('modal-job-id-text').innerText = jobId;
            document.getElementById('modal-product-text').innerText = productStr;
            
            // ล้างค่าเก่า
            document.getElementById('modal-fg-qty').value = '';
            document.getElementById('modal-ng-qty').value = '';
            document.getElementById('modal-fg-convert').innerText = '';
            document.getElementById('modal-ng-convert').innerText = '';
            
            document.getElementById('closeJobModal').classList.remove('hidden');
        };

        // ปิด Modal
        window.closeModal = function() {
            document.getElementById('closeJobModal').classList.add('hidden');
        };

        // คำนวณและแสดงข้อความแปลงหน่วย (kg ↔ ชิ้น) ใต้ช่องกรอก
        window.calculateModalQty = function(type) {
            const qtyInput = document.getElementById(`modal-${type}-qty`).value;
            const unit = document.getElementById(`modal-${type}-unit`).value;
            const productStr = document.getElementById('modal-product-str').value;
            const convertText = document.getElementById(`modal-${type}-convert`);
            
            if (!qtyInput || isNaN(qtyInput) || parseFloat(qtyInput) <= 0) {
                convertText.innerText = '';
                return;
            }
            
            const wpp = getWeightPerPc(productStr);
            const val = parseFloat(qtyInput);
            
            if (unit === 'kg') {
                const pcs = Math.round(val / wpp);
                convertText.innerText = `≈ ${pcs.toLocaleString()} ชิ้น`;
            } else {
                const kg = val * wpp;
                convertText.innerText = `≈ ${kg.toFixed(3)} kg`;
            }
        };

        // ยืนยันการปิดงานส่งข้อมูลเข้า Backend
        async function submitCloseJob(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit-close');
            btn.disabled = true;
            btn.innerHTML = "⏳ กำลังบันทึก...";

            const jobId = document.getElementById('modal-job-id').value;
            
            // นำยอดมาจัดรูปแบบ เช่น "15.5 kg" หรือ "3000 ชิ้น"
            const fgQtyRaw = document.getElementById('modal-fg-qty').value;
            const fgUnit = document.getElementById('modal-fg-unit').value;
            const fgQtyFinal = fgQtyRaw ? `${fgQtyRaw} ${fgUnit}` : `0 ${fgUnit}`;
            
            const ngQtyRaw = document.getElementById('modal-ng-qty').value;
            const ngUnit = document.getElementById('modal-ng-unit').value;
            const ngQtyFinal = ngQtyRaw ? `${ngQtyRaw} ${ngUnit}` : `0 ${ngUnit}`;

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'UPDATE_SORTING',
                        jobId: jobId,
                        status: 'Completed',
                        closedBy: currentUser.name || currentUser.username,
                        fgQty: fgQtyFinal, // ยอด FG ที่กรอก
                        ngQty: ngQtyFinal  // ยอด NG ที่กรอก
                    })
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    closeModal();
                    loadSortJobs(); 
                } else {
                    alert("❌ เกิดข้อผิดพลาด: " + result.message);
                }
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "✔ บันทึกปิดงาน";
            }
        }
    </script>
</body>
